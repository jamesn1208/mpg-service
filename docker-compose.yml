name: fuel-service

services:
  proxy:
    ports:
      - "8080:80"
    networks:
      - proxied-network
    image: nginx:stable
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: "unless-stopped"

  server:
    build:
      context: server/src/
      dockerfile: Dockerfile
      network: host
    image: fuel-service/server:latest
    restart: "unless-stopped"
    expose:
      - "8080"
    env_file:
      - server/env/secrets.env
      - server/env/config.env
    networks:
      - proxied-network
    depends_on:
      - database
      - proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/api/v1/health/liveness', timeout=5)"]
      interval: 10m
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: client/
      dockerfile: Dockerfile
      network: host
    image: fuel-service/client:latest
    expose:
      - "8080"
    restart: "unless-stopped"
    networks:
      - proxied-network
    depends_on:
      - server

  database:
    image: postgres:alpine
    restart: "unless-stopped"
    env_file:
      - server/env/secrets.env
      - server/env/config.env
    ports:  # TODO: Change this to 'expose' for final release, so we can only access database internally
      - "5433:5432"
    networks:
      - proxied-network
    volumes:
      - ./db_data:/var/lib/postgresql/18/docker

networks:
  proxied-network:
    driver: bridge
